<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inspired Threads | Custom Apparel</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --text: #ffffff;
            --accent: #8e9aa8;
            --card-bg: #161616;
            --transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }

        body { background-color: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; }

        /* Navigation */
        header { position: fixed; width: 100%; top: 0; background: rgba(10,10,10,0.9); backdrop-filter: blur(10px); padding: 20px; display: flex; justify-content: center; z-index: 1000; }
        .nav-tab { background: none; border: none; color: var(--text); padding: 0 20px; text-transform: uppercase; letter-spacing: 0.1em; cursor: pointer; }

        /* Hero */
        .hero { height: 80vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: url('inspired threads cover photo.jpg') no-repeat center center/cover; }
        .logo { width: 200px; margin-bottom: 20px; }

        /* Shop Grid */
        .shop-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; padding: 60px 20px; max-width: 1200px; margin: auto; }
        .card { background: var(--card-bg); padding: 20px; text-align: center; border: 1px solid #333; transition: var(--transition); }
        .card:hover { border-color: var(--text); }
    </style>
</head>
<body>

    <header>
        <button class="nav-tab" onclick="document.getElementById('home').scrollIntoView({behavior:'smooth'})">Home</button>
        <button class="nav-tab" onclick="document.getElementById('shop').scrollIntoView({behavior:'smooth'})">Shop</button>
        <button class="nav-tab" onclick="document.getElementById('about').scrollIntoView({behavior:'smooth'})">About</button>
        <button class="nav-tab" onclick="document.getElementById('contact').scrollIntoView({behavior:'smooth'})">Contact</button>
    </header>

    <section id="home" class="hero">
        <img src="inspiredthreadsLogo.jpg" alt="Logo" class="logo">
        <h1>Inspired Threads</h1>
    </section>

    <section id="shop" style="padding-top: 100px;">
        <h2 style="text-align: center;">Featured Prints</h2>
        <div class="shop-grid">
            <div class="card"><h3>Custom DTG Shirt</h3><p>$25.00</p></div>
            <div class="card"><h3>Vinyl Graphic Hoodie</h3><p>$45.00</p></div>
            <div class="card"><h3>Limited Edition Print</h3><p>$30.00</p></div>
        </div>
    </section>

    <section id="about" style="padding: 100px 20px; text-align: center;">
        <h2>Our Craft</h2>
        <p>Specializing in precision heat press, DTG, and vinyl applications.</p>
    </section>

    <section id="contact" style="padding: 100px 20px; text-align: center;">
        <h2>Get a Quote</h2>
        <p>Ready to bring your design to life? Reach out today.</p>
    </section>

</body>
</html>
