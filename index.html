<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inspired Threads | Custom Apparel</title>
    <style>
        :root {
            --bg: #fafafa;
            --text: #2d2d2d;
            --accent: #c5a085; /* Champagne/Muted gold */
            --font-main: 'Helvetica Neue', Arial, sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: var(--font-main);
            margin: 0;
            padding: 0;
        }

        header {
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .brand-name {
            font-size: 2.5rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            margin-bottom: 20px;
        }

        nav {
            display: flex;
            gap: 30px;
        }

        nav a {
            text-decoration: none;
            color: var(--text);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            transition: color 0.3s;
        }

        nav a:hover {
            color: var(--accent);
        }

        .hero {
            padding: 100px 20px;
            text-align: center;
        }

        h1 { font-weight: 300; }
    </style>
</head>
<body>

    <header>
        <div class="brand-name">Inspired Threads</div>
        <nav>
            <a href="#">Home</a>
            <a href="#">Shop</a>
            <a href="#">About</a>
            <a href="#">Contact</a>
        </nav>
    </header>

    <main class="hero">
        <h1>Artisan Apparel & Custom Prints</h1>
        <p>Specializing in Direct-to-Garment and Vinyl heat press designs.</p>
    </main>

</body>
</html>
